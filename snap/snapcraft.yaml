name: aetherbus
title: AetherBus
base: core24
adopt-info: aetherbus
icon: snap/gui/icon.png
summary: Transparent serial-port interceptor and SocketCAN bus analyzer
description: |
  AetherBus is a lightweight, open-source serial-port interceptor, protocol sniffer, and SocketCAN bus analyzer for Linux. It transparently proxies a physical UART through a kernel pseudo-terminal, allowing unmodified target applications to communicate with the device while AetherBus captures, decodes, and injects bytes in real time. An independent SocketCAN session provides a built-in CAN bus analyzer within a dedicated tab.

  Key Features:
  * Transparent Interception: Opens the real device and exposes a virtual port (pseudo-terminal) for the target application to connect to, mirroring all traffic.
  * Directional Capture: Multiplexed loop tags each chunk as Rx (device) or Tx (application) with millisecond timestamps.
  * Live Console: Side-by-side HEX, ASCII, BINARY, and DECIMAL views, color-coded by direction and optimized for high-baud streams.
  * Live Byte Injection: Inject crafted hex byte sequences directly to either the device or the application side of the link.
  * SocketCAN Bus Analysis: Includes a live per-ID sniffer table, structured ID/mask filters, CAN-FD, and DBC-driven signal decoding.

  Use Cases:
  * Reverse-engineering serial protocols
  * Debugging embedded firmware links
  * Man-in-the-middle diagnostics of UART traffic
  * Linux SocketCAN bus analysis and capture

  Note: This snap is built with classic confinement to allow direct access to serial ports and network interfaces (SocketCAN) without requiring manual interface connection commands.
license: MIT
contact: https://github.com/beratatmaca/AetherBus/issues
issues: https://github.com/beratatmaca/AetherBus/issues
website: https://github.com/beratatmaca/AetherBus
source-code: https://github.com/beratatmaca/AetherBus

grade: stable
confinement: classic

layout:
  /usr/lib/x86_64-linux-gnu/libproxy:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/libproxy

apps:
  aetherbus:
    command: usr/local/bin/aetherbus
    extensions: [ kde-neon-6 ]
    environment:
      # The kde-neon-6 extension's desktop-launch script force-exports
      # QT_QPA_PLATFORM=wayland-egl on Wayland sessions, overriding the value
      # below, unless DISABLE_WAYLAND is set. Without this the app segfaults
      # on Wayland hosts where wayland-egl fails to load. See the launcher's
      # `if [[ -n "$XDG_RUNTIME_DIR" && -z "$DISABLE_WAYLAND" ]]` gate.
      DISABLE_WAYLAND: "1"
      QT_QPA_PLATFORM: "xcb"
    plugs:
      # Required for SocketCAN (which uses AF_CAN network sockets)
      - network
      - network-bind
      - serial-port
      - raw-usb

parts:
  aetherbus:
    plugin: cmake
    source: .
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
    build-packages:
      - build-essential
      - qt6-base-dev
      - libgl1-mesa-dev
      - git
    stage-packages:
      - libqt6core6
      - libqt6network6
      - libqt6gui6t64
      - libqt6widgets6t64
      - qt6-wayland
      - libxcb-cursor0
      - libgl1
      - libegl1
      - libopengl0
      - libfontconfig1
      - libgraphite2-3
      - libharfbuzz0b
      - libmd4c0
      - libproxy1v5
    override-pull: |
      craftctl default
      base=$(tr -d '[:space:]' < VERSION)
      build=$(git rev-list --count HEAD)
      craftctl set version="${base}.${build}"

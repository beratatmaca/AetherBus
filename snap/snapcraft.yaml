name: aetherbus
title: AetherBus
base: core24
adopt-info: aetherbus
icon: snap/gui/icon.png
summary: Unified serial interceptor, SocketCAN analyzer, and Ethernet packet sniffer
description: |
  AetherBus is a lightweight, open-source diagnostic application combining a serial-port interceptor, SocketCAN analyzer, and Ethernet packet sniffer into a unified Linux dashboard.

  It transparently proxies a physical UART through a kernel pseudo-terminal, allowing unmodified applications to talk to target hardware while capturing, decoding, and injecting traffic in real time. Independent native session tabs provide specialized SocketCAN analysis and low-level Ethernet packet interception.

  Key Features:
  * Transparent UART Interception: Maps a physical device to a virtual pseudo-terminal link, capturing bidirectional serial data streams with millisecond precision.
  * Multi-View Live Console: Displays data in side-by-side HEX, ASCII, BINARY, and DECIMAL layouts, optimized for high-bandwidth data rendering.
  * SocketCAN Session: Provides an independent CAN bus analyzer with real-time per-ID sniffer tables, ID/mask filtering, CAN-FD capability, and DBC-driven signal decoding.
  * Ethernet Session: Captures raw network traffic directly at the data-link layer, displaying frame structures, addresses, and payload contents.
  * Live Traffic Injection: Supports manual injection of raw byte sequences, frames, or packets directly into active serial, CAN, or Ethernet links.

  Use Cases:
  * Reverse-engineering embedded fieldbus and network protocols.
  * Debugging serial, CAN, and Ethernet communication links in real time.
  * Analyzing data-link layer interactions and executing man-in-the-middle diagnostics.

  Note: This snap uses strict confinement. After installing, connect the interfaces it needs for hardware access (see the project README for the exact commands): serial-port, raw-usb, network-control, and network-observe.
license: MIT
contact: https://github.com/beratatmaca/AetherBus/issues
issues: https://github.com/beratatmaca/AetherBus/issues
website: https://github.com/beratatmaca/AetherBus
source-code: https://github.com/beratatmaca/AetherBus

grade: stable
confinement: strict

layout:
  /usr/lib/x86_64-linux-gnu/libproxy:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/libproxy

apps:
  aetherbus:
    command: usr/local/bin/aetherbus
    extensions: [ kde-neon-6 ]
    environment:
      # The kde-neon-6 extension's desktop-launch script force-exports
      # QT_QPA_PLATFORM=wayland-egl on Wayland sessions, overriding the value
      # below, unless DISABLE_WAYLAND is set. Without this the app segfaults
      # on Wayland hosts where wayland-egl fails to load. See the launcher's
      # `if [[ -n "$XDG_RUNTIME_DIR" && -z "$DISABLE_WAYLAND" ]]` gate.
      DISABLE_WAYLAND: "1"
      QT_QPA_PLATFORM: "xcb"
    plugs:
      # Required for SocketCAN (which uses AF_CAN network sockets); network
      # and network-bind auto-connect, the rest need a manual `snap connect`
      # (see README) since they grant broad hardware/network access.
      - network
      - network-bind
      - network-control
      - network-observe
      - serial-port
      - raw-usb

parts:
  aetherbus:
    plugin: cmake
    source: .
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
    build-packages:
      - build-essential
      - qt6-base-dev
      - libgl1-mesa-dev
      - libpcap-dev
      - git
    stage-packages:
      - libqt6core6
      - libqt6network6
      - libqt6gui6t64
      - libqt6widgets6t64
      - qt6-wayland
      - libxcb-cursor0
      - libgl1
      - libegl1
      - libopengl0
      - libfontconfig1
      - libgraphite2-3
      - libharfbuzz0b
      - libmd4c0
      - libproxy1v5
      - libpcap0.8
    override-pull: |
      craftctl default
      base=$(tr -d '[:space:]' < VERSION)
      build=$(git rev-list --count HEAD)
      craftctl set version="${base}.${build}"
